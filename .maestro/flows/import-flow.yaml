# Import Flow E2E Test for GG-Economy Mobile
# Tests the complete import process from file selection to categorization
#
# Tags: import, e2e
# Validates: Requirements 11, 12, 13, 14, 16, 17, 33
#
# Flow:
# 1. Open the Import screen (modal)
# 2. Select a file via document picker
# 3. Parse the file (CSV or OFX)
# 4. View import progress
# 5. Navigate to Review screen
# 6. Categorize imported transactions
# 7. Save the categorized transactions
#
# IMPORTANT NOTES:
# - Document picker interaction requires system UI interaction
# - This test uses Maestro's ability to interact with system dialogs
# - For CI/CD, consider using a mock file or pre-seeded test data
# - The test assumes a test file is available on the device

appId: com.ggeconomy.mobile

---

# ============================================
# Test: Complete Import Flow
# ============================================

- launchApp:
    clearState: true

# Wait for app to fully load
- extendedWaitUntil:
    visible: "Dashboard"
    timeout: 15000

# Take screenshot of initial state
- takeScreenshot: "import_01_dashboard_initial"

# ============================================
# Step 1: Navigate to Import Screen
# ============================================

# Option A: From Dashboard empty state (if no transactions)
# The dashboard shows an "Import File" button when empty
- tapOn:
    text: "Import File"
    optional: true

# Option B: Navigate to Review tab first, then to Import
# If the above didn't work (dashboard has data), try via Review tab
- tapOn:
    text: "Review"
    optional: true

# Wait for either Import screen or Review screen
- extendedWaitUntil:
    anyOf:
      - visible:
          id: "import-screen"
      - visible:
          id: "review-screen"
      - visible:
          id: "review-screen-empty"
    timeout: 10000

# If we're on Review screen (empty), tap the import button
- tapOn:
    text: "Import File"
    optional: true

# Take screenshot of import screen
- takeScreenshot: "import_02_import_screen"

# ============================================
# Step 2: Verify Import Screen Elements
# ============================================

# Verify the import screen is displayed
- assertVisible:
    id: "import-screen"
    optional: true

# Verify supported formats are displayed
- assertVisible:
    text: ".CSV"
    optional: true

- assertVisible:
    text: ".OFX"
    optional: true

# Verify the select file button is present
- assertVisible:
    id: "import-select-button"
    optional: true

# Take screenshot showing supported formats
- takeScreenshot: "import_03_supported_formats"

# ============================================
# Step 3: Select File via Document Picker
# ============================================

# Tap the select file button
- tapOn:
    id: "import-select-button"

# Wait for document picker to appear
# Note: Document picker is a system UI, so we need to interact with it
# The exact interaction depends on the device/emulator
- extendedWaitUntil:
    anyOf:
      # Android file picker indicators
      - visible: "Recent"
      - visible: "Browse"
      - visible: "Downloads"
      # iOS file picker indicators
      - visible: "Recents"
      - visible: "Browse"
      # Or the progress screen if file was auto-selected (for testing)
      - visible:
          id: "import-progress-screen"
    timeout: 10000

# Take screenshot of document picker
- takeScreenshot: "import_04_document_picker"

# ============================================
# Step 4: Navigate Document Picker (Android)
# ============================================

# Try to navigate to Downloads folder where test files might be
- tapOn:
    text: "Downloads"
    optional: true

# Wait a moment for folder to load
- extendedWaitUntil:
    visible: "Downloads"
    timeout: 5000
    optional: true

# Look for a test CSV file
# Note: For actual testing, you should have a test file pre-loaded
# Common test file names to look for:
- tapOn:
    text: "test_transactions.csv"
    optional: true

- tapOn:
    text: "bank_statement.csv"
    optional: true

- tapOn:
    text: "transactions.csv"
    optional: true

- tapOn:
    text: "test.csv"
    optional: true

# If no specific file found, try to select any CSV file
- tapOn:
    text: ".csv"
    optional: true

# Take screenshot after file selection attempt
- takeScreenshot: "import_05_file_selected"

# ============================================
# Step 5: View Import Progress
# ============================================

# Wait for progress screen to appear
- extendedWaitUntil:
    anyOf:
      - visible:
          id: "import-progress-screen"
      - visible:
          id: "import-progress-spinner"
      - visible: "Importing"
      # Or error if file selection failed
      - visible:
          id: "import-error"
    timeout: 15000

# Take screenshot of progress screen
- takeScreenshot: "import_06_progress_screen"

# Verify progress steps are visible
- assertVisible:
    id: "import-progress-steps"
    optional: true

# Wait for import to complete (success or error)
- extendedWaitUntil:
    anyOf:
      - visible:
          id: "import-success-icon"
      - visible:
          id: "import-error-icon"
      - visible:
          id: "import-go-to-review-button"
      - visible:
          id: "import-retry-button"
    timeout: 30000

# Take screenshot of import result
- takeScreenshot: "import_07_import_result"

# ============================================
# Step 6: Handle Import Result
# ============================================

# If import was successful, verify results are shown
- assertVisible:
    id: "import-results"
    optional: true

# If there's a "Go to Review" button, tap it
- tapOn:
    id: "import-go-to-review-button"
    optional: true

# If there was an error, take a screenshot and try retry
- tapOn:
    id: "import-retry-button"
    optional: true

# ============================================
# Step 7: Navigate to Review Screen
# ============================================

# Wait for Review screen to appear
- extendedWaitUntil:
    anyOf:
      - visible:
          id: "review-screen"
      - visible:
          id: "review-screen-empty"
      - visible: "Review"
    timeout: 10000

# Take screenshot of review screen
- takeScreenshot: "import_08_review_screen"

# ============================================
# Step 8: Verify Review Screen Content
# ============================================

# Check if there are transactions to review
- assertVisible:
    id: "review-screen"
    optional: true

# If there are transactions, verify the list is visible
- assertVisible:
    id: "review-list"
    optional: true

# Take screenshot showing transactions to review
- takeScreenshot: "import_09_transactions_to_review"

# ============================================
# Step 9: Categorize a Transaction
# ============================================

# Tap on the first transaction in the review list
# The testID pattern is "review-transaction-{id}"
- tapOn:
    text: ".*"
    index: 0
    optional: true

# Wait for the review modal to appear
- extendedWaitUntil:
    visible:
      id: "review-item-modal"
    timeout: 5000
    optional: true

# Take screenshot of review modal
- takeScreenshot: "import_10_review_modal"

# ============================================
# Step 10: Edit Transaction in Modal
# ============================================

# Verify modal elements are present
- assertVisible:
    id: "description-input"
    optional: true

- assertVisible:
    id: "category-selector"
    optional: true

- assertVisible:
    id: "exclude-toggle"
    optional: true

# If there's a suggested category, use it
- tapOn:
    id: "suggested-category"
    optional: true

# Or tap on category selector to choose a category
- tapOn:
    id: "category-selector"
    optional: true

# Wait for category picker
- extendedWaitUntil:
    visible:
      id: "category-picker"
    timeout: 5000
    optional: true

# Take screenshot of category picker
- takeScreenshot: "import_11_category_picker"

# Select a category (e.g., first available)
- tapOn:
    text: "Food"
    optional: true

- tapOn:
    text: "Transport"
    optional: true

- tapOn:
    text: "Bills"
    optional: true

# Close category picker if still open
- back:
    optional: true

# ============================================
# Step 11: Save Categorized Transaction
# ============================================

# Tap "Mark as Reviewed" button to save
- tapOn:
    text: "Mark as Reviewed"
    optional: true

# Wait for modal to close
- extendedWaitUntil:
    notVisible:
      id: "review-item-modal"
    timeout: 5000
    optional: true

# Take screenshot after saving
- takeScreenshot: "import_12_transaction_saved"

# ============================================
# Step 12: Verify Transaction was Reviewed
# ============================================

# The review count should have decreased
# Or if all transactions were reviewed, empty state should show
- extendedWaitUntil:
    anyOf:
      - visible:
          id: "review-screen"
      - visible:
          id: "review-screen-empty"
    timeout: 5000

# Take final screenshot
- takeScreenshot: "import_13_final_state"

# ============================================
# Test Completion
# ============================================

- runScript:
    script: |
      console.log('Import flow E2E test completed!');
      console.log('Steps completed:');
      console.log('1. Launched app and navigated to Import screen');
      console.log('2. Verified supported file formats');
      console.log('3. Attempted file selection via document picker');
      console.log('4. Viewed import progress');
      console.log('5. Navigated to Review screen');
      console.log('6. Opened transaction for categorization');
      console.log('7. Selected category and saved transaction');
      console.log('');
      console.log('NOTE: Document picker interaction may require manual setup');
      console.log('For CI/CD, consider using mock data or pre-seeded database');

