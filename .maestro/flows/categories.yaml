# Categories Management E2E Test for GG-Economy Mobile
# Tests category listing, creation, validation, and modal interactions.
#
# Tags: categories
# Validates: Requirements 10.1, 10.2, 10.3, 10.4, 12.1, 12.2
#
# Flow:
# Part A - App Launch and navigate to Settings > Categories
# Part B - List Verification (categories grouped by type)
# Part C - Add Category (create new expense category)
# Part D - Validation (empty required fields show errors)
# Part E - Close Modal (dismiss form and return to list)

appId: com.ggeconomy.mobile

---

# ============================================
# Part A - App Launch
# ============================================

- launchApp:
    clearState: true

# Wait for app to fully load (15s timeout for cold start)
- extendedWaitUntil:
    visible: "Dashboard"
    timeout: 15000

- takeScreenshot: "categories_01_app_launched"

# Navigate to Settings tab
- tapOn: "Settings"

- extendedWaitUntil:
    visible: "Settings"
    timeout: 5000

- takeScreenshot: "categories_02_settings_tab"

# Navigate to Categories settings
- tapOn:
    id: "settings-item-categories"

- extendedWaitUntil:
    visible:
      id: "categories-settings-screen"
    timeout: 5000

- takeScreenshot: "categories_03_categories_screen_loaded"

# ============================================
# Part B - List Verification
# ============================================

# Verify categories settings screen is loaded
- assertVisible:
    id: "categories-settings-screen"

# Verify expense group filter tabs are displayed (categories grouped by type)
- assertVisible:
    id: "expense-group-filter"

# Verify add category button is present
- assertVisible:
    id: "add-category-button"

- takeScreenshot: "categories_04_list_with_groups"

# ============================================
# Part C - Add Category
# ============================================

# Tap add category button
- tapOn:
    id: "add-category-button"

# Verify category form modal opens
- extendedWaitUntil:
    visible:
      id: "category-form-modal"
    timeout: 3000

- assertVisible:
    id: "category-form-modal"

- takeScreenshot: "categories_05_form_modal_opened"

# Fill category name
- tapOn:
    id: "category-name-input"

- inputText: "Test Category"

# Select expense type
- tapOn:
    id: "type-expense-button"

# Hide keyboard before tapping save
- hideKeyboard

- takeScreenshot: "categories_06_form_filled"

# Tap save button
- tapOn:
    id: "save-category-button"

# Wait for modal to close and return to categories list
- extendedWaitUntil:
    visible:
      id: "categories-settings-screen"
    timeout: 10000

# Verify new category appears in the list
- assertVisible: "Test Category"

- takeScreenshot: "categories_07_new_category_added"

# ============================================
# Part D - Validation
# ============================================

# Tap add category button again
- tapOn:
    id: "add-category-button"

# Verify form modal opens
- extendedWaitUntil:
    visible:
      id: "category-form-modal"
    timeout: 3000

- assertVisible:
    id: "category-form-modal"

# Attempt to save with empty name (clear any pre-filled text)
- tapOn:
    id: "category-name-input"

- eraseText: 50

# Hide keyboard
- hideKeyboard

# Tap save button with empty required fields
- tapOn:
    id: "save-category-button"

# Verify validation errors are displayed (alert dialog appears)
- extendedWaitUntil:
    anyOf:
      - visible: "Error"
      - visible: "Erro"
      - visible: "Required"
      - visible: "Obrigatório"
      - visible: "required"
      - visible: "obrigatório"
    timeout: 5000

- takeScreenshot: "categories_08_validation_error"

# Dismiss the validation error alert
- tapOn:
    text: "OK"
    optional: true

- tapOn:
    text: "Ok"
    optional: true

# Close the modal after validation test
- tapOn:
    id: "close-category-modal"

# Wait for return to categories list
- extendedWaitUntil:
    visible:
      id: "categories-settings-screen"
    timeout: 3000

- takeScreenshot: "categories_09_after_validation_dismissed"

# ============================================
# Part E - Close Modal
# ============================================

# Open category form again
- tapOn:
    id: "add-category-button"

# Verify form modal opens
- extendedWaitUntil:
    visible:
      id: "category-form-modal"
    timeout: 3000

- assertVisible:
    id: "category-form-modal"

- takeScreenshot: "categories_10_modal_opened_for_close"

# Tap close button to dismiss modal
- tapOn:
    id: "close-category-modal"

# Verify return to categories list
- extendedWaitUntil:
    visible:
      id: "categories-settings-screen"
    timeout: 3000

- assertVisible:
    id: "categories-settings-screen"

- takeScreenshot: "categories_11_modal_closed_back_to_list"

# ============================================
# Test Completion
# ============================================

- runScript:
    script: |
      console.log('Categories E2E test completed successfully!');
      console.log('');
      console.log('Steps completed:');
      console.log('Part A - App Launch:');
      console.log('  - Launched app with clearState: true');
      console.log('  - Navigated to Settings > Categories');
      console.log('  - Verified categories-settings-screen loaded');
      console.log('');
      console.log('Part B - List Verification:');
      console.log('  - Verified categories screen loads');
      console.log('  - Verified expense-group-filter tabs displayed');
      console.log('  - Verified categories grouped by type (income/expense)');
      console.log('');
      console.log('Part C - Add Category:');
      console.log('  - Tapped add-category-button');
      console.log('  - Verified category-form-modal opens');
      console.log('  - Filled category-name-input with "Test Category"');
      console.log('  - Selected expense type via type-expense-button');
      console.log('  - Tapped save-category-button');
      console.log('  - Verified new category appears in list');
      console.log('');
      console.log('Part D - Validation:');
      console.log('  - Opened form modal again');
      console.log('  - Attempted save with empty required fields');
      console.log('  - Verified validation errors displayed');
      console.log('');
      console.log('Part E - Close Modal:');
      console.log('  - Opened category form');
      console.log('  - Tapped close-category-modal');
      console.log('  - Verified return to categories list');
      console.log('');
      console.log('All categories management tests passed!');
