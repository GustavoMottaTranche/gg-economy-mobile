# Manual Entry Flow E2E Test for GG-Economy Mobile
# Tests the complete manual transaction entry process
#
# Tags: manual, e2e
# Validates: Requirements 23, 24, 33
#
# Flow:
# 1. Navigate to Manual Entry tab
# 2. Fill out the transaction form (date, amount, description, category)
# 3. Select income or expense type
# 4. Save the transaction
# 5. Verify the transaction appears in the Transactions screen
#
# This test covers:
# - Form field validation
# - Draft auto-save functionality
# - Income and expense type toggle
# - Category selection
# - Transaction persistence
# - Verification in Transactions list

appId: com.ggeconomy.mobile

---

# ============================================
# Test: Complete Manual Entry Flow
# ============================================

- launchApp:
    clearState: true

# Wait for app to fully load
- extendedWaitUntil:
    visible: "Dashboard"
    timeout: 15000

# Take screenshot of initial state
- takeScreenshot: "manual_01_dashboard_initial"

# ============================================
# Step 1: Navigate to Manual Entry Tab
# ============================================

- tapOn: "Manual"

# Wait for Manual Entry screen to load
- extendedWaitUntil:
    visible:
      id: "manual-screen"
    timeout: 10000

# Verify we're on the Manual Entry screen
- assertVisible:
    id: "manual-screen"

# Take screenshot of manual entry screen
- takeScreenshot: "manual_02_manual_entry_screen"

# ============================================
# Step 2: Verify Form Elements Are Present
# ============================================

# Verify type toggle is present
- assertVisible:
    id: "type-toggle"

# Verify amount input is present
- assertVisible:
    id: "amount-input"

# Verify description input is present
- assertVisible:
    id: "description-input"

# Verify date picker is present
- assertVisible:
    id: "date-picker"

# Verify category selector is present
- assertVisible:
    id: "category-selector"

# Verify submit button is present
- assertVisible:
    id: "submit-button"

# Take screenshot showing all form elements
- takeScreenshot: "manual_03_form_elements"

# ============================================
# Part A: Test Expense Entry Flow
# ============================================

# ============================================
# Step 3: Select Expense Type (Default)
# ============================================

# Expense should be selected by default, but tap to ensure
- tapOn:
    id: "type-expense"

# Verify expense type is selected
- assertVisible:
    id: "type-expense"

# Take screenshot of expense type selected
- takeScreenshot: "manual_04_expense_type_selected"

# ============================================
# Step 4: Enter Amount
# ============================================

# Tap on amount input
- tapOn:
    id: "amount-input"

# Enter test amount
- inputText: "125.50"

# Verify amount preview shows the value
- assertVisible:
    id: "amount-preview"

# Take screenshot of amount entered
- takeScreenshot: "manual_05_amount_entered"

# ============================================
# Step 5: Enter Description
# ============================================

# Tap on description input
- tapOn:
    id: "description-input"

# Enter test description
- inputText: "Grocery shopping at supermarket"

# Hide keyboard
- hideKeyboard

# Take screenshot of description entered
- takeScreenshot: "manual_06_description_entered"

# ============================================
# Step 6: Select Category
# ============================================

# Tap on category selector
- tapOn:
    id: "category-selector"

# Wait for category picker to appear
- extendedWaitUntil:
    visible:
      id: "category-picker"
    timeout: 5000

# Take screenshot of category picker
- takeScreenshot: "manual_07_category_picker"

# Select a category (Food/Alimentação)
- tapOn:
    text: "Food"
    optional: true

- tapOn:
    text: "Alimentação"
    optional: true

# If neither found, try tapping the first category item
- tapOn:
    id: "category-item-0"
    optional: true

# Wait for category picker to close
- extendedWaitUntil:
    notVisible:
      id: "category-picker"
    timeout: 5000
    optional: true

# Take screenshot after category selection
- takeScreenshot: "manual_08_category_selected"

# ============================================
# Step 7: Verify Draft Auto-Save
# ============================================

# Wait a moment for draft to auto-save (2 second debounce)
- extendedWaitUntil:
    visible:
      id: "draft-indicator"
    timeout: 5000
    optional: true

# Take screenshot showing draft saved indicator
- takeScreenshot: "manual_09_draft_saved"

# ============================================
# Step 8: Save the Expense Transaction
# ============================================

# Scroll down to ensure submit button is visible
- scroll:
    direction: DOWN
    distance: 200

# Tap submit button
- tapOn:
    id: "submit-button"

# Wait for success confirmation (Alert dialog)
- extendedWaitUntil:
    anyOf:
      - visible: "Success"
      - visible: "Sucesso"
      - visible: "Transaction saved"
      - visible: "Transação salva"
    timeout: 10000

# Take screenshot of success message
- takeScreenshot: "manual_10_expense_saved_success"

# Dismiss the success alert
- tapOn:
    text: "OK"
    optional: true

- tapOn:
    text: "Ok"
    optional: true

# ============================================
# Step 9: Verify Form Reset After Save
# ============================================

# Wait for form to reset
- extendedWaitUntil:
    visible:
      id: "manual-screen"
    timeout: 5000

# Verify amount input is cleared
- assertVisible:
    id: "amount-input"

# Take screenshot of reset form
- takeScreenshot: "manual_11_form_reset"

# ============================================
# Part B: Test Income Entry Flow
# ============================================

# ============================================
# Step 10: Select Income Type
# ============================================

# Tap on income type
- tapOn:
    id: "type-income"

# Verify income type is selected
- assertVisible:
    id: "type-income"

# Take screenshot of income type selected
- takeScreenshot: "manual_12_income_type_selected"

# ============================================
# Step 11: Enter Income Amount
# ============================================

# Tap on amount input
- tapOn:
    id: "amount-input"

# Enter income amount
- inputText: "3500.00"

# Take screenshot of income amount
- takeScreenshot: "manual_13_income_amount_entered"

# ============================================
# Step 12: Enter Income Description
# ============================================

# Tap on description input
- tapOn:
    id: "description-input"

# Enter income description
- inputText: "Monthly salary payment"

# Hide keyboard
- hideKeyboard

# Take screenshot of income description
- takeScreenshot: "manual_14_income_description_entered"

# ============================================
# Step 13: Select Income Category
# ============================================

# Tap on category selector
- tapOn:
    id: "category-selector"

# Wait for category picker
- extendedWaitUntil:
    visible:
      id: "category-picker"
    timeout: 5000

# Select income category (Salary/Salário)
- tapOn:
    text: "Salary"
    optional: true

- tapOn:
    text: "Salário"
    optional: true

# If neither found, try tapping the first category item
- tapOn:
    id: "category-item-0"
    optional: true

# Wait for picker to close
- extendedWaitUntil:
    notVisible:
      id: "category-picker"
    timeout: 5000
    optional: true

# Take screenshot after income category selection
- takeScreenshot: "manual_15_income_category_selected"

# ============================================
# Step 14: Save the Income Transaction
# ============================================

# Scroll down to ensure submit button is visible
- scroll:
    direction: DOWN
    distance: 200

# Tap submit button
- tapOn:
    id: "submit-button"

# Wait for success confirmation
- extendedWaitUntil:
    anyOf:
      - visible: "Success"
      - visible: "Sucesso"
      - visible: "Transaction saved"
      - visible: "Transação salva"
    timeout: 10000

# Take screenshot of income saved success
- takeScreenshot: "manual_16_income_saved_success"

# Dismiss the success alert
- tapOn:
    text: "OK"
    optional: true

- tapOn:
    text: "Ok"
    optional: true

# ============================================
# Part C: Verify Transactions in List
# ============================================

# ============================================
# Step 15: Navigate to Transactions Tab
# ============================================

# Tap on Transactions tab
- tapOn: "Transactions"

# Wait for Transactions screen to load
- extendedWaitUntil:
    visible:
      id: "transactions-screen"
    timeout: 10000

# Verify we're on the Transactions screen
- assertVisible:
    id: "transactions-screen"

# Take screenshot of transactions screen
- takeScreenshot: "manual_17_transactions_screen"

# ============================================
# Step 16: Verify Transactions Are Listed
# ============================================

# Verify the transactions list is visible
- assertVisible:
    id: "transactions-list"

# Verify monthly summary is visible
- assertVisible:
    id: "monthly-summary"

# Take screenshot showing transactions list
- takeScreenshot: "manual_18_transactions_list"

# ============================================
# Step 17: Verify Expense Transaction
# ============================================

# Look for the expense transaction we created
- assertVisible:
    text: "Grocery shopping"
    optional: true

- assertVisible:
    text: "125"
    optional: true

# Take screenshot showing expense in list
- takeScreenshot: "manual_19_expense_in_list"

# ============================================
# Step 18: Verify Income Transaction
# ============================================

# Look for the income transaction we created
- assertVisible:
    text: "Monthly salary"
    optional: true

- assertVisible:
    text: "3500"
    optional: true

# Take screenshot showing income in list
- takeScreenshot: "manual_20_income_in_list"

# ============================================
# Step 19: Verify Monthly Summary Updated
# ============================================

# The monthly summary should show both income and expense
# Verify the summary section is visible
- assertVisible:
    id: "monthly-summary"

# Take screenshot of final state with summary
- takeScreenshot: "manual_21_final_summary"

# ============================================
# Part D: Test Form Validation
# ============================================

# ============================================
# Step 20: Navigate Back to Manual Entry
# ============================================

# Tap on Manual tab
- tapOn: "Manual"

# Wait for Manual Entry screen
- extendedWaitUntil:
    visible:
      id: "manual-screen"
    timeout: 10000

# Take screenshot of manual entry screen
- takeScreenshot: "manual_22_validation_test_start"

# ============================================
# Step 21: Test Empty Form Validation
# ============================================

# Try to submit without filling required fields
- scroll:
    direction: DOWN
    distance: 200

- tapOn:
    id: "submit-button"

# Wait for validation error
- extendedWaitUntil:
    anyOf:
      - visible: "Error"
      - visible: "Erro"
      - visible:
          id: "amount-error"
      - visible:
          id: "description-error"
    timeout: 5000

# Take screenshot of validation error
- takeScreenshot: "manual_23_validation_error"

# Dismiss any error alert
- tapOn:
    text: "OK"
    optional: true

- tapOn:
    text: "Ok"
    optional: true

# ============================================
# Part E: Test Clear Draft Functionality
# ============================================

# ============================================
# Step 22: Fill Form Partially
# ============================================

# Enter some data
- tapOn:
    id: "amount-input"

- inputText: "999.99"

- tapOn:
    id: "description-input"

- inputText: "Test draft clear"

- hideKeyboard

# Wait for draft to save
- extendedWaitUntil:
    visible:
      id: "draft-indicator"
    timeout: 5000
    optional: true

# Take screenshot of partial form
- takeScreenshot: "manual_24_partial_form"

# ============================================
# Step 23: Clear Draft
# ============================================

# Scroll to see clear draft button
- scroll:
    direction: DOWN
    distance: 200

# Tap clear draft button
- tapOn:
    id: "clear-draft-button"
    optional: true

# Wait for confirmation dialog
- extendedWaitUntil:
    anyOf:
      - visible: "Clear"
      - visible: "Limpar"
      - visible: "Confirm"
      - visible: "Confirmar"
    timeout: 5000
    optional: true

# Confirm clear draft
- tapOn:
    text: "Confirm"
    optional: true

- tapOn:
    text: "Confirmar"
    optional: true

- tapOn:
    text: "Clear"
    optional: true

- tapOn:
    text: "Limpar"
    optional: true

# Take screenshot after clearing draft
- takeScreenshot: "manual_25_draft_cleared"

# ============================================
# Test Completion
# ============================================

- runScript:
    script: |
      console.log('Manual Entry E2E test completed!');
      console.log('');
      console.log('Steps completed:');
      console.log('Part A - Expense Entry:');
      console.log('  1. Navigated to Manual Entry tab');
      console.log('  2. Verified all form elements present');
      console.log('  3. Selected expense type');
      console.log('  4. Entered amount (125.50)');
      console.log('  5. Entered description (Grocery shopping)');
      console.log('  6. Selected category');
      console.log('  7. Verified draft auto-save');
      console.log('  8. Saved expense transaction');
      console.log('  9. Verified form reset');
      console.log('');
      console.log('Part B - Income Entry:');
      console.log('  10. Selected income type');
      console.log('  11. Entered income amount (3500.00)');
      console.log('  12. Entered income description (Monthly salary)');
      console.log('  13. Selected income category');
      console.log('  14. Saved income transaction');
      console.log('');
      console.log('Part C - Verification:');
      console.log('  15. Navigated to Transactions tab');
      console.log('  16. Verified transactions list visible');
      console.log('  17. Verified expense transaction in list');
      console.log('  18. Verified income transaction in list');
      console.log('  19. Verified monthly summary updated');
      console.log('');
      console.log('Part D - Validation:');
      console.log('  20. Navigated back to Manual Entry');
      console.log('  21. Tested empty form validation');
      console.log('');
      console.log('Part E - Draft Management:');
      console.log('  22. Filled form partially');
      console.log('  23. Cleared draft successfully');
      console.log('');
      console.log('All manual entry tests passed!');
