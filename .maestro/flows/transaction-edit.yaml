# Transaction Edit Flow E2E Test for GG-Economy Mobile
# Tests the transaction detail screen, category editing, and cancel behavior
#
# Tags: transactions
# Validates: Requirements 9.1, 9.2, 9.3, 12.1, 12.2
#
# Flow:
# Part A - Create a test expense transaction with a known category
# Part B - Open the transaction detail screen and verify pre-filled fields
# Part C - Edit the category via the category edit modal
# Part D - Cancel editing without saving and verify no modification
#
# This test covers:
# - Transaction detail screen opens with correct data
# - Category edit modal opens and allows selection
# - Saving category change updates the transaction
# - Cancelling edit returns without modification

appId: com.ggeconomy.mobile

---

# ============================================
# Part A - Data Setup
# Create a test expense transaction with a known category
# ============================================

- launchApp:
    clearState: true

# Wait for app to fully load
- extendedWaitUntil:
    visible: "Dashboard"
    timeout: 15000

- takeScreenshot: "txn_edit_01_app_launched"

# Navigate to Manual Entry tab
- tapOn: "Manual"

# Wait for Manual Entry screen to load
- extendedWaitUntil:
    visible:
      id: "manual-screen"
    timeout: 5000

- assertVisible:
    id: "manual-screen"

# Select expense type
- tapOn:
    id: "type-expense"

# Enter amount
- tapOn:
    id: "amount-input"

- inputText: "75.00"

# Enter description
- tapOn:
    id: "description-input"

- inputText: "Edit Test Expense"

- hideKeyboard

# Select a category
- tapOn:
    id: "category-selector"

- extendedWaitUntil:
    visible:
      id: "category-picker"
    timeout: 5000

# Select the first category
- tapOn:
    id: "category-item-0"

# Wait for category picker to close
- extendedWaitUntil:
    notVisible:
      id: "category-picker"
    timeout: 5000
    optional: true

# Submit the transaction
- scroll:
    direction: DOWN
    distance: 200

- tapOn:
    id: "submit-button"

# Wait for success confirmation
- extendedWaitUntil:
    anyOf:
      - visible: "Success"
      - visible: "Sucesso"
      - visible: "Transaction saved"
      - visible: "Transação salva"
    timeout: 10000

- takeScreenshot: "txn_edit_02_expense_created"

# Dismiss the success alert
- tapOn:
    text: "OK"
    optional: true

- tapOn:
    text: "Ok"
    optional: true

# ============================================
# Part B - Open Edit Modal
# Navigate to Transactions tab, tap the transaction card,
# verify transaction-detail-screen opens with pre-filled fields
# ============================================

# Navigate to Transactions tab
- tapOn: "Transactions"

- extendedWaitUntil:
    visible:
      id: "transactions-screen"
    timeout: 5000

- assertVisible:
    id: "transactions-screen"

- takeScreenshot: "txn_edit_03_transactions_list"

# Tap the first transaction card to open detail screen
- tapOn:
    id: "transaction-card-1"
    optional: true

- tapOn:
    id: "transaction-item-1"
    optional: true

# Wait for transaction detail screen to open
- extendedWaitUntil:
    visible:
      id: "transaction-detail-screen"
    timeout: 5000

- assertVisible:
    id: "transaction-detail-screen"

# Verify pre-filled fields are visible
- assertVisible:
    id: "amount-display"

- assertVisible:
    id: "details-card"

- assertVisible:
    id: "detail-category"

- assertVisible:
    id: "detail-description"

- takeScreenshot: "txn_edit_04_detail_screen_opened"

# ============================================
# Part C - Edit Category
# Tap detail-category, verify category-edit-modal opens,
# select a different category, save, verify updated category
# ============================================

# Tap the category row to open category edit modal
- tapOn:
    id: "detail-category-touchable"

# Wait for category edit modal to open
- extendedWaitUntil:
    visible:
      id: "category-edit-modal"
    timeout: 3000

- assertVisible:
    id: "category-edit-modal"

- assertVisible:
    id: "category-edit-selector"

- takeScreenshot: "txn_edit_05_category_modal_opened"

# Select a different category (tap a category item in the selector)
# The CategorySelector shows category items - tap a different one
- tapOn:
    id: "category-item-1"
    optional: true

- tapOn:
    id: "category-item-2"
    optional: true

- takeScreenshot: "txn_edit_06_category_selected"

# For non-installment transactions, selecting a category auto-saves and closes the modal
# Wait for modal to close (category selection triggers save automatically)
- extendedWaitUntil:
    notVisible:
      id: "category-edit-modal"
    timeout: 5000
    optional: true

# If an installment prompt appeared, handle it
- tapOn:
    text: "Apply to this parcel"
    optional: true

- tapOn:
    text: "Aplicar a esta parcela"
    optional: true

# Verify we're back on the detail screen with updated category
- extendedWaitUntil:
    visible:
      id: "transaction-detail-screen"
    timeout: 5000

- assertVisible:
    id: "detail-category"

- takeScreenshot: "txn_edit_07_category_updated"

# Navigate back to transactions list
- back

- extendedWaitUntil:
    visible:
      id: "transactions-screen"
    timeout: 5000

- takeScreenshot: "txn_edit_08_back_to_list_after_edit"

# ============================================
# Part D - Cancel Edit
# Tap a transaction card again, open category modal,
# tap cancel without saving, verify no modification
# ============================================

# Tap the transaction card again
- tapOn:
    id: "transaction-card-1"
    optional: true

- tapOn:
    id: "transaction-item-1"
    optional: true

# Wait for transaction detail screen
- extendedWaitUntil:
    visible:
      id: "transaction-detail-screen"
    timeout: 5000

- assertVisible:
    id: "transaction-detail-screen"

- takeScreenshot: "txn_edit_09_detail_reopened"

# Tap category to open the edit modal again
- tapOn:
    id: "detail-category-touchable"

# Wait for category edit modal
- extendedWaitUntil:
    visible:
      id: "category-edit-modal"
    timeout: 3000

- assertVisible:
    id: "category-edit-modal"

- takeScreenshot: "txn_edit_10_cancel_modal_opened"

# Tap cancel button without selecting a new category
- tapOn:
    id: "category-edit-cancel"

# Verify modal closes
- extendedWaitUntil:
    notVisible:
      id: "category-edit-modal"
    timeout: 3000

# Verify we're still on the detail screen without modification
- assertVisible:
    id: "transaction-detail-screen"

- assertVisible:
    id: "detail-category"

- takeScreenshot: "txn_edit_11_cancel_no_changes"

# Navigate back to transactions list
- back

- extendedWaitUntil:
    visible:
      id: "transactions-screen"
    timeout: 5000

- assertVisible:
    id: "transactions-screen"

- takeScreenshot: "txn_edit_12_final_list_unchanged"

# ============================================
# Test Completion
# ============================================

- runScript:
    script: |
      console.log('Transaction Edit E2E test completed!');
      console.log('');
      console.log('Steps completed:');
      console.log('Part A - Data Setup:');
      console.log('  1. Launched app with clearState');
      console.log('  2. Created test expense transaction (75.00, Edit Test Expense)');
      console.log('');
      console.log('Part B - Open Edit Modal:');
      console.log('  3. Navigated to Transactions tab');
      console.log('  4. Tapped transaction card');
      console.log('  5. Verified detail screen with pre-filled fields (amount, category, description)');
      console.log('');
      console.log('Part C - Edit Category:');
      console.log('  6. Tapped category row to open edit modal');
      console.log('  7. Verified category-edit-modal with category-edit-selector');
      console.log('  8. Selected a different category');
      console.log('  9. Verified category updated on detail screen');
      console.log('');
      console.log('Part D - Cancel Edit:');
      console.log('  10. Reopened transaction detail');
      console.log('  11. Opened category edit modal');
      console.log('  12. Tapped category-edit-cancel');
      console.log('  13. Verified no changes applied');
      console.log('');
      console.log('All transaction edit tests passed!');
